# Railway config — un solo servicio: Hono sirve dist/ + /api/maia.
#
# Variables que TIENEN que estar configuradas en Railway → Variables:
#   - OPENAI_API_KEY              (obligatoria; se usa en build para ingest y en runtime)
#   - OPENAI_MODEL                (opcional; default gpt-4o-mini)
#   - OPENAI_EMBEDDING_MODEL      (opcional; default text-embedding-3-small)
#   - OPENAI_BASE_URL             (opcional; Azure/proxy)
#
# Railway inyecta PORT automáticamente — server/index.ts ya lo lee.
# Railway pasa las service Variables también como --build-arg al Dockerfile,
# así que `npm run ingest` (dentro del builder stage) puede generar el
# índice RAG durante el build. El secreto NO termina en la imagen final
# porque vive sólo en el stage `builder` que se descarta.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
